# Minimal stack for local development — skips Nginx, Prometheus, Grafana, exporters
# Usage: docker compose -f docker/docker-compose.local.yml up -d

services:
  pgvector:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: pgvector
    ports:
      - "5432:5432"
    volumes:
      - pgvector_local:/var/lib/postgresql/data
    env_file:
      - ./env/.env.postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_local:/qdrant/storage
    restart: unless-stopped

volumes:
  pgvector_local:
  qdrant_local:
